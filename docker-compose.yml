version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/public:/var/www/html:ro
    depends_on:
      - php
    networks:
      - mibel-net

  php:
    build:
      context: ./docker/php
    volumes:
      - ./app/public:/var/www/html
      - ./app/src:/app/src
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - clickhouse
    networks:
      - mibel-net

  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "8123:8123"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./data/clickhouse:/var/lib/clickhouse/user_files
    environment:
      - CLICKHOUSE_DB=mibel
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - mibel-net

  python-worker:
    container_name: mibel-datalab-python-worker-1
    build:
      context: ./docker/python
    volumes:
      - ./workers:/app
      - ./data:/data
      - ./scripts/unidades:/scripts/unidades:ro
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - mibel-net

networks:
  mibel-net:
    driver: bridge

volumes:
  clickhouse-data:
